# ============================================================
# 麻将牌 YOLO 数据集配置
# ============================================================
#
# 该文件定义了 YOLO 训练所需的数据集路径和类别映射。
#
# 类别说明（共 27 种，对应四川麻将的牌）：
# - 万子 (m): 1m~9m   → 类别 0~8
# - 筒子 (p): 1p~9p   → 类别 9~17
# - 条子 (s): 1s~9s   → 类别 18~26
#
# 注意：四川麻将没有字牌，所以只有 27 类

# 数据集根目录（训练时根据实际情况修改）
path: ./datasets/mahjong

# 训练集和验证集路径（相对于 path）
train: images/train
val: images/val

# 类别数量
nc: 27

# 类别名称（必须与标注文件中的 class_id 保持一致）
names:
  0: 1m    # 一万
  1: 2m    # 二万
  2: 3m    # 三万
  3: 4m    # 四万
  4: 5m    # 五万
  5: 6m    # 六万
  6: 7m    # 七万
  7: 8m    # 八万
  8: 9m    # 九万
  9: 1p    # 一筒
  10: 2p   # 二筒
  11: 3p   # 三筒
  12: 4p   # 四筒
  13: 5p   # 五筒
  14: 6p   # 六筒
  15: 7p   # 七筒
  16: 8p   # 八筒
  17: 9p   # 九筒
  18: 1s   # 一条
  19: 2s   # 二条
  20: 3s   # 三条
  21: 4s   # 四条
  22: 5s   # 五条
  23: 6s   # 六条
  24: 7s   # 七条
  25: 8s   # 八条
  26: 9s   # 九条
